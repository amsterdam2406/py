services:
  # ── Main Web Service (Django + Gunicorn) ──
  - type: web
    name: fotasco-payroll
    runtime: python
    plan: free
    buildCommand: |
      pip install --upgrade pip setuptools
      pip install -r requirements.txt
      python manage.py collectstatic --no-input
      python manage.py migrate --noinput
    startCommand: gunicorn fotasco_payroll.wsgi:application
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: DATABASE_URL
        fromDatabase:
          name: fotasco-db
          property: connectionString
      - key: PAYSTACK_SECRET_KEY
        sync: false
      - key: PAYSTACK_PUBLIC_KEY
        sync: false
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false

  # ── Celery Worker ──
  - type: worker
    name: celery-worker
    runtime: python
    plan: free
    buildCommand: |
      pip install --upgrade pip setuptools
      pip install -r requirements.txt
    startCommand: celery -A fotasco_payroll worker --loglevel=info --concurrency=2
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: fotasco-db
          property: connectionString
      - key: SECRET_KEY
        fromService:
          type: web
          name: fotasco-payroll
          envVarKey: SECRET_KEY
      - key: DEBUG
        value: "False"
      - key: PAYSTACK_SECRET_KEY
        sync: false

  # ── Celery Beat (Scheduler) ──
  - type: worker
    name: celery-beat
    runtime: python
    plan: free
    buildCommand: |
      pip install --upgrade pip setuptools
      pip install -r requirements.txt
    startCommand: celery -A fotasco_payroll beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: fotasco-db
          property: connectionString
      - key: SECRET_KEY
        fromService:
          type: web
          name: fotasco-payroll
          envVarKey: SECRET_KEY
      - key: DEBUG
        value: "False"
      - key: PAYSTACK_SECRET_KEY
        sync: false

databases:
  - name: fotasco-db
    plan: free
    ipAllowList: []