<div style="font-family: Arial, sans-serif; color: #333; max-width: 600px; border: 1px solid #eee; padding: 20px;">
    <h2 style="color: #117e62;">Action Required: New Registration</h2>
    <p>A new employee has registered and is awaiting your approval.</p>
    <hr style="border: 0; border-top: 1px solid #eee;">
    <table style="width: 100%;">
        <tr><td><strong>Name:</strong></td><td>{{ name }}</td></tr>
        <tr><td><strong>Username:</strong></td><td>{{ username }}</td></tr>
        <tr><td><strong>Role:</strong></td><td>{{ role }}</td></tr>
        <tr><td><strong>Email:</strong></td><td>{{ email }}</td></tr>
        <tr><td><strong>Location:</strong></td><td>{{ location }}</td></tr>
    </table>
    <div style="margin-top: 30px; text-align: center;">
        <a href="{{ site_url }}" style="background-color: #117e62; color: white; padding: 12px 25px; text-decoration: none; border-radius: 5px; font-weight: bold;">
            Go to Admin Dashboard
        </a>
    </div>
    <p style="font-size: 12px; color: #999; margin-top: 30px;">Fotasco Payroll System Automations</p>
</div>
